name: Bug Report
description: Report a repository bug, broken workflow, or incorrect behavior.
title: "[Bug]: "
labels: []
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Provide a short summary of the problem.
      placeholder: The docs build fails when...
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe what happened, what you expected, and any relevant context.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation or evidence
      description: Share logs, screenshots, links, or other evidence.
      placeholder: Paste relevant output or links here.
    validations:
      required: false
