name: Documentation Correction
description: Report incorrect, outdated, or unclear documentation.
title: "[Docs]: "
labels: []
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Provide a short summary of the documentation problem.
      placeholder: The Functions hosting page links to the wrong article.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Explain what is wrong or unclear and what readers might misunderstand.
      placeholder: Describe the current wording and the problem it causes.
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Affected page or file
      description: Provide the page URL or repository file path.
      placeholder: docs/platform/hosting-plans.md
    validations:
      required: true
  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested correction
      description: Share the correction you expect, if known.
      placeholder: Replace the current sentence with...
    validations:
      required: false
