name: docs-ci

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material pymdown-extensions mkdocs-minify-plugin
      - name: Build docs in strict mode
        run: mkdocs build --strict

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material pymdown-extensions mkdocs-minify-plugin
      - name: Build docs for deployment
        run: mkdocs build --strict
      - name: Publish site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
