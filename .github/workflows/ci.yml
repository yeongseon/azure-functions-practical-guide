name: CI — Documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'apps/**/*.sh'
      - 'labs/**/*.sh'
      - 'infra/**/*.sh'
      - 'infra/**/*.bicep'
      - 'mkdocs.yml'
      - '.github/workflows/ci.yml'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-minify-plugin
      - name: Build documentation
        run: mkdocs build --strict

  scripts:
    name: Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate shell syntax
        run: |
          find apps labs infra scripts -type f -name '*.sh' -print0 | xargs -0 -r bash -n

      - name: Run ShellCheck (errors block)
        run: |
          find apps labs infra scripts -type f -name '*.sh' -print0 | xargs -0 -r shellcheck --severity=error

      - name: Report ShellCheck backlog (advisory)
        run: |
          find apps labs infra scripts -type f -name '*.sh' -print0 | xargs -0 -r shellcheck
        continue-on-error: true  # Lenient: surfaces pre-existing warning/info/style backlog without blocking PRs.

  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate Bicep templates
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2
        with:
          inlineScript: |
            set -euo pipefail

            for file in \
              infra/main.bicep \
              infra/consumption/main.bicep \
              infra/flex-consumption/main.bicep \
              infra/premium/main.bicep \
              infra/dedicated/main.bicep
            do
              echo "Building $file"
              output=$(az bicep build --file "$file" --stdout 2>&1 >/dev/null) || {
                echo "$output"
                exit 1
              }
              echo "$output"
              if echo "$output" | grep -q "outputs-should-not-contain-secrets"; then
                echo "::error file=$file::Bicep output contains a secret-like value"
                exit 1
              fi
            done
